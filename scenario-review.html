<script>
// ====================================================================
// 数据与逻辑（与后端 §6.3 评分、§5 状态机、§6.3.3 否决项一致）
// ====================================================================
const WEIGHTS = { bv:0.40, feas:0.25, rep:0.20, strat:0.15 };

const STATUS_LABELS = { draft:"草稿", submitted:"已提交", need_info:"待补充", screening:"初筛中",
  observing:"入库观察", recommend_deep:"推荐深评", rejected:"已淘汰", merged:"已合并" };
const STATUS_COLOR = { draft:"bg-gray-100 text-gray-600", submitted:"bg-blue-100 text-blue-700",
  need_info:"bg-amber-100 text-amber-700", screening:"bg-indigo-100 text-indigo-700",
  observing:"bg-slate-100 text-slate-600", recommend_deep:"bg-green-100 text-green-700",
  rejected:"bg-red-100 text-red-600", merged:"bg-purple-100 text-purple-600" };
const RECO_LABELS = { P0:"P0 优先立项", P1:"P1 深度评估", P2:"P2 入库观察",
  reject:"淘汰", need_info:"补充", merge:"合并" };
const RECO_COLOR = { P0:"bg-green-600 text-white", P1:"bg-green-100 text-green-700",
  P2:"bg-slate-100 text-slate-600", reject:"bg-red-100 text-red-600",
  need_info:"bg-amber-100 text-amber-700", merge:"bg-purple-100 text-purple-600" };
const VETO_FLAGS = { no_business_owner:"无明确业务Owner", no_data_in_3m:"三个月内无法获得数据样本",
  demo_only:"只能做演示，无法进入真实流程", roi_undefinable:"ROI无法定义",
  compliance_risk:"安全/合规/隐私/数据风险不可控", full_auto_no_human:"关键动作完全自动化且无人工确认" };

// 状态机：from -> {to -> [允许角色]}（§5.2）
const TRANSITIONS = {
  draft:{ submitted:["submitter","admin"] },
  submitted:{ screening:["screener","admin"], need_info:["screener","admin"] },
  need_info:{ submitted:["submitter","admin"] },
  screening:{ need_info:["screener","admin"], observing:["screener","admin"],
    recommend_deep:["screener","admin"], rejected:["screener","admin"], merged:["screener","admin"] },
};

const ROLE_LABELS = { submitter:"提报人", owner:"Owner", screener:"初筛人",
  reviewer:"评委", ai_rep:"AI研发", manager:"管理层", admin:"管理员" };

function weighted(s){ return Math.round((s.bv*WEIGHTS.bv + s.feas*WEIGHTS.feas + s.rep*WEIGHTS.rep + s.strat*WEIGHTS.strat)*100)/100; }
function classify(w){ return w>=4?"P0":w>=3?"P1":w>=2?"P2":"reject"; }
function recommend(s, veto){ let r=classify(weighted(s)); if(veto&&veto.length&&(r==="P0"||r==="P1")) r="need_info"; return r; }

// ====================================================================
// 存储（localStorage 模拟后端，可重置）
// ====================================================================

    title:"财务审单智能稽核数智工程师", industry:["流程制造","消费品"], sap_modules:["FICO"], ai_capabilities:["审核","异常识别"],

function seed(){
  const u=(id,username,name,roles,dept)=>({id,username,display_name:name,roles,department:dept});
  const users=[
    u("u1","consultant","顾问·张工",["submitter"],"离散制造事业部"),
    u("u2","owner","Owner·李工",["owner","submitter"],"流程制造事业部"),
    u("u3","screener","初筛人·王经理",["screener"],"数智工程师创新中心"),
    u("u4","reviewer","评委·赵专家",["reviewer"],"评审委员会"),
    u("u5","manager","管理层·孙总",["manager"],"创新中心"),
    u("u6","admin","系统管理员",["admin"],"IT"),
  ];
  const now=Date.now();
  const scenarios=[
    { id:"s1", title:"需求预测数智工程师", status:"submitted", industry:["离散制造"], sap_modules:["PP","MM"],
      ai_capabilities:["预测"], customer_name:"某汽车零部件客户",
      pain_point:"需求波动大，计划员凭经验预测，缺货与呆滞并存",
      human_process:"计划员每周手工汇总历史出货+销售口头预测做调整",
      frequency:"每周", volume:"约2000个SKU", kpi_candidates:["库存周转","OTD"],
      data_basis:"SAP出货历史可得，销售预测在Excel", willingness_to_pay:"medium",
      estimated_value:"库存降低15%", submitter_id:"u1", latest_weighted_score:null, latest_recommendation:null, created_at:now-86400000 },
    { id:"s2", title:"月结异常自动稽核数智工程师", status:"draft", industry:["流程制造"], sap_modules:["FICO"],
      ai_capabilities:["异常识别"], customer_name:"",
      pain_point:"月结期间凭证异常靠人工逐笔排查，耗时且易漏",
      human_process:"财务在月结日加班逐笔核对", frequency:"月度", volume:"数千张凭证",
      kpi_candidates:["月结天数"], data_basis:"凭证数据在SAP可得", willingness_to_pay:"strong",
      estimated_value:"", submitter_id:"u2", latest_weighted_score:null, latest_recommendation:null, created_at:now-43200000 },
  ];
  const scores=[];
  TEMPLATES.forEach((t,i)=>{
    const id="t"+(i+1);
    const sc={ id, title:t.title, status:t.seedStatus, industry:t.industry, sap_modules:t.sap_modules,
      ai_capabilities:t.ai_capabilities, customer_name:t.customer_name, pain_point:t.pain_point,
      human_process:t.human_process, frequency:t.frequency, volume:t.volume, kpi_candidates:t.kpi_candidates,
      data_basis:t.data_basis, willingness_to_pay:t.willingness_to_pay, estimated_value:t.estimated_value,
      submitter_id:t.submitter, latest_weighted_score:null, latest_recommendation:null, created_at:now-(i+3)*3600000 };
    if(t.seedScore){
      const w=weighted(t.seedScore), reco=recommend(t.seedScore,[]);
      scores.push({ id:"trs"+(i+1), scenario_id:id, reviewer_id:"u3", score_type:"screening",
        bv:t.seedScore.bv, feas:t.seedScore.feas, rep:t.seedScore.rep, strat:t.seedScore.strat,
        weighted_score:w, recommendation:reco, veto:[], comment:"初筛评分（示例）", created_at:now-(i+2)*3600000 });
      sc.latest_weighted_score=w; sc.latest_recommendation=reco;
    }
    scenarios.push(sc);
  });
  return { users, scenarios, scores, comments:[], notifications:[], seq:100 };
}
function load(){ try{ const r=localStorage.getItem(KEY); DB=r?JSON.parse(r):seed(); }catch(e){ DB=seed(); } }
function save(){ localStorage.setItem(KEY, JSON.stringify(DB)); }
function reset(){ DB=seed(); SESSION=null; localStorage.removeItem("sr_session"); save(); state.view="login"; render(); }
function nid(p){ return p+(++DB.seq); }
function userById(id){ return DB.users.find(u=>u.id===id); }
function me(){ return SESSION?userById(SESSION):null; }
function hasRole(...r){ const u=me(); return u && r.some(x=>u.roles.includes(x)); }
function notify(uid,event,title,body,sid){ DB.notifications.unshift({id:nid("n"),recipient_id:uid,event,title,body:body||null,scenario_id:sid||null,is_read:false,created_at:Date.now()}); }

// ====================================================================
// 视图状态与路由
// ====================================================================
let state={ view:"login", scenarioId:null, activeScreen:null,
  form:blankForm(), score:{bv:3,feas:3,rep:3,strat:3}, veto:[], scoreComment:"" };

function blankForm(){ return { title:"", industry:[], sap_modules:[], ai_capabilities:[], customer_name:"",
  pain_point:"", human_process:"", frequency:"", volume:"", kpi_candidates:"", data_basis:"",
  willingness_to_pay:"unknown", estimated_value:"" }; }

const esc=(s)=>String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
function statusBadge(s){ return `<span class="px-2 py-0.5 rounded text-xs ${STATUS_COLOR[s]||'bg-gray-100'}">${STATUS_LABELS[s]||s}</span>`; }
function recoBadge(r){ if(!r) return `<span class="text-xs text-gray-300">—</span>`; return `<span class="px-2 py-0.5 rounded text-xs ${RECO_COLOR[r]||'bg-gray-100'}">${RECO_LABELS[r]||r}</span>`; }

// ====================================================================
// 渲染
// ====================================================================
function render(){
  const app=document.getElementById("app");
  if(state.view==="login"){ app.innerHTML=loginView(); return; }
  app.innerHTML = nav() + `<main class="max-w-6xl mx-auto px-4 py-6">${
    state.view==="mine"? mineView():
    state.view==="new"? newView():
    state.view==="detail"? detailView():
    state.view==="library"? libraryView():
    state.view==="screening"? screeningView():
    state.view==="notifications"? notifView(): ""
  }</main>`;
}

function nav(){
  const u=me();
  const screener = hasRole("screener","admin");
  const unread = DB.notifications.filter(n=>n.recipient_id===SESSION&&!n.is_read).length;
  const link=(v,label,cls="")=>`<a onclick="go('${v}')" class="cursor-pointer hover:text-blue-700 ${state.view===v?'text-blue-700 font-medium':''} ${cls}">${label}</a>`;
  return `<header class="bg-white border-b sticky top-0 z-10">
    <div class="max-w-6xl mx-auto px-4 h-14 flex items-center gap-6">
      <span class="font-semibold text-blue-700">金种子 · 场景提报评审</span>
      <nav class="flex gap-4 text-sm text-gray-600">
        ${link("mine","我的提报")}${link("new","新建提报")}${link("library","场景库")}
        ${screener?link("screening","初筛队列","text-blue-600 font-medium"):""}
        ${link("notifications", `通知${unread?`<span class='ml-1 bg-red-500 text-white rounded-full px-1.5 text-[10px]'>${unread}</span>`:""}`)}

function field(label,inner){ return `<div><label class="block text-sm text-gray-600 mb-1.5">${label}</label>${inner}</div>`; }

function applyTemplate(key){
  const t=TEMPLATES.find(x=>x.key===key); if(!t) return;
  state.form={ title:t.title, industry:[...t.industry], sap_modules:[...t.sap_modules],
    ai_capabilities:[...t.ai_capabilities], customer_name:t.customer_name, pain_point:t.pain_point,
    human_process:t.human_process, frequency:t.frequency, volume:t.volume,
    kpi_candidates:t.kpi_candidates.join(", "), data_basis:t.data_basis,
    willingness_to_pay:t.willingness_to_pay, estimated_value:t.estimated_value };
  render();
}

function screeningView(){

  const sc=state.score, w=weighted(sc);
  const level = state.veto.length?"命中否决项 → 不可直通":(w>=4?"P0":w>=3?"P1":w>=2?"P2":"淘汰");
  const dims=[["bv","业务价值","40%"],["feas","技术可行性","25%"],["rep","可复制性","20%"],["strat","战略契合","15%"]];
  const trans=[["recommend_deep","推荐深评"],["observing","入库观察"],["need_info","退回补充"],["rejected","淘汰"],["merged","合并"]];
  return `<div class="grid grid-cols-3 gap-5">
    <div class="col-span-1"><h1 class="text-lg font-semibold mb-3">初筛队列</h1>

        <button onclick="pickScreen('${s.id}')" class="w-full text-left bg-white rounded-lg shadow-sm p-3 hover:shadow ${a&&a.id===s.id?'ring-2 ring-blue-500':''}">

        <h2 class="font-semibold mb-1">${esc(a.title)}</h2><p class="text-sm text-gray-500 mb-4">${esc(a.pain_point)}</p>
        <div id="scoreMsg"></div>
        <div class="space-y-3 mb-4">${dims.map(([k,l,wt])=>`<div class="flex items-center gap-3">
          <span class="w-28 text-sm text-gray-600">${l}</span><span class="text-xs text-gray-400 w-10">${wt}</span>
          <input type="range" min="1" max="5" step="1" value="${sc[k]}" oninput="setScore('${k}',this.value)" class="flex-1">
          <span class="w-6 text-center font-medium">${sc[k]}</span></div>`).join("")}</div>
        <div class="mb-4 p-3 bg-gray-50 rounded flex items-center justify-between">
          <span class="text-sm text-gray-600">综合加权分（预览）</span><span class="font-semibold">${w.toFixed(2)} · ${level}</span></div>
        <div class="mb-4"><div class="text-sm text-gray-600 mb-2">否决项（命中则不可直通 POC，§6.3.3）</div>
          <div class="space-y-1">${Object.entries(VETO_FLAGS).map(([k,l])=>`<label class="flex items-center gap-2 text-sm text-gray-600">
            <input type="checkbox" ${state.veto.includes(k)?"checked":""} onchange="toggleVeto('${k}')"> ${l}</label>`).join("")}</div></div>
        <textarea id="scoreCmt" class="w-full border rounded px-3 py-2 text-sm mb-4" rows="2" placeholder="评分理由 / 退回原因（留痕）" oninput="state.scoreComment=this.value">${esc(state.scoreComment)}</textarea>
        <div class="flex flex-wrap gap-2"><button onclick="submitScore('${a.id}')" class="bg-blue-600 text-white text-sm rounded px-4 py-2">提交评分</button>

// ====================================================================
// 交互动作
// ====================================================================
function go(v){ state.view=v; if(v!=="screening"){state.activeScreen=null;} render(); }
function loginAs(username){ const u=DB.users.find(x=>x.username===username); SESSION=u.id; localStorage.setItem("sr_session",SESSION); state.view="mine"; render(); }
function logout(){ SESSION=null; localStorage.removeItem("sr_session"); state.view="login"; render(); }
function openDetail(id){ state.scenarioId=id; state.view="detail"; render(); }
function setF(k,v){ state.form[k]=v; }
function toggleChip(field,val){ const a=state.form[field]; const i=a.indexOf(val); i>=0?a.splice(i,1):a.push(val); render(); }

function saveScenario(submit){
  const f=state.form;
  const s={ id:nid("s"), title:f.title.trim(), status:"draft",
    industry:[...f.industry], sap_modules:[...f.sap_modules], ai_capabilities:[...f.ai_capabilities],
    customer_name:f.customer_name, pain_point:f.pain_point, human_process:f.human_process,
    frequency:f.frequency, volume:f.volume,
    kpi_candidates:f.kpi_candidates.split(/[,，、]/).map(x=>x.trim()).filter(Boolean),
    data_basis:f.data_basis, willingness_to_pay:f.willingness_to_pay, estimated_value:f.estimated_value,
    submitter_id:SESSION, latest_weighted_score:null, latest_recommendation:null, created_at:Date.now() };
  if(submit){ const err=validate(s); if(err){ document.getElementById("formErr").innerHTML=`<div class="mb-4 text-sm text-red-600 bg-red-50 p-2 rounded">缺少必填字段：${err}</div>`; return; } }
  DB.scenarios.push(s);
  if(submit){ s.status="submitted"; DB.users.filter(u=>u.roles.includes("screener")).forEach(u=>notify(u.id,"scenario_submitted",`新场景待初筛：${s.title}`,null,s.id)); }
  save(); state.form=blankForm(); openDetail(s.id);
}
function validate(s){ const m=[]; ["title","pain_point","human_process","data_basis"].forEach(k=>{ if(!s[k]) m.push(k); });
  if(!s.industry.length||!s.sap_modules.length||!s.kpi_candidates.length) m.push("行业/模块/KPI"); return m.length?m.join("、"):null; }

function submitScenario(id){ const s=DB.scenarios.find(x=>x.id===id); const err=validate(s);
  if(err){ alert("缺少必填字段："+err); return; }
  s.status="submitted"; DB.users.filter(u=>u.roles.includes("screener")).forEach(u=>notify(u.id,"scenario_submitted",`新场景待初筛：${s.title}`,null,s.id)); save(); render(); }

function addComment(id){ const el=document.getElementById("cmt"); const v=el.value.trim(); if(!v) return;
  DB.comments.push({id:nid("c"),scenario_id:id,author_id:SESSION,content:v,created_at:Date.now()}); save(); render(); }

function pickScreen(id){ state.activeScreen=id; state.score={bv:3,feas:3,rep:3,strat:3}; state.veto=[]; state.scoreComment=""; render(); }
function setScore(k,v){ state.score[k]=Number(v); render(); }
function toggleVeto(k){ const i=state.veto.indexOf(k); i>=0?state.veto.splice(i,1):state.veto.push(k); render(); }

function submitScore(id){
  const s=DB.scenarios.find(x=>x.id===id); if(!(s.status==="submitted"||s.status==="screening")){ alert("当前状态不可初筛评分"); return; }
  const sc=state.score, w=weighted(sc), reco=recommend(sc,state.veto);
  DB.scores.push({id:nid("rs"),scenario_id:id,reviewer_id:SESSION,bv:sc.bv,feas:sc.feas,rep:sc.rep,strat:sc.strat,
    weighted_score:w,recommendation:reco,veto:[...state.veto],comment:state.scoreComment,created_at:Date.now()});
  if(s.status==="submitted") s.status="screening";
  s.latest_weighted_score=w; s.latest_recommendation=reco;
  notify(s.submitter_id,"screening_scored",`场景已初筛评分：${s.title}（${RECO_LABELS[reco]} / ${w}）`,state.scoreComment,s.id);
  save();
  const msgEl=document.getElementById("scoreMsg");
  if(msgEl) msgEl.innerHTML=`<div class="mb-3 text-sm text-blue-700 bg-blue-50 p-2 rounded">已评分：加权分 ${w.toFixed(2)} → ${RECO_LABELS[reco]}</div>`;
  render();
}

function doTransition(id,target){
  const s=DB.scenarios.find(x=>x.id===id); const u=me();
  const allowed=(TRANSITIONS[s.status]||{})[target];
  if(!allowed){ alert(`不允许的状态流转：${STATUS_LABELS[s.status]} → ${STATUS_LABELS[target]}`); return; }
  if(!allowed.some(r=>u.roles.includes(r))){ alert("当前角色无权执行该流转"); return; }
  s.status=target;
  if(state.scoreComment) DB.comments.push({id:nid("c"),scenario_id:id,author_id:SESSION,content:state.scoreComment,created_at:Date.now()});
  if(target==="need_info") notify(s.submitter_id,"need_info",`场景需补充：${s.title}`,state.scoreComment,s.id);
  save(); state.activeScreen=null; render();
}

function readNotif(id){ const n=DB.notifications.find(x=>x.id===id); if(n){ n.is_read=true; save(); render(); } }

// ====================================================================
// 启动
// ====================================================================
load();
const sess=localStorage.getItem("sr_session");
if(sess && userById(sess)){ SESSION=sess; state.view="mine"; }
render();
</script>
