# 场景提报与评审系统 — 容器化部署（MVP一期）
# 一键启动： docker compose up -d --build
# 访问： http://localhost:3100  （前端经服务端代理 /api → backend）

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: scenario
      POSTGRES_PASSWORD: ${DB_PASSWORD:-scenario}
      POSTGRES_DB: scenario_review
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scenario -d scenario_review"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://scenario:${DB_PASSWORD:-scenario}@db:5432/scenario_review
      JWT_SECRET: ${JWT_SECRET:-change-me-in-prod}
      SEED_ON_START: "1"          # 首跑写入种子（幂等，库非空则跳过）
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3100}
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8099"                     # 仅集群内暴露，由前端代理访问
    restart: unless-stopped

  frontend:
    build: ./frontend
    environment:
      BACKEND_URL: http://backend:8099
    depends_on:
      - backend
    ports:
      - "${WEB_PORT:-3100}:3000"   # 宿主 3100 → 容器内 3000
    restart: unless-stopped

volumes:
  pgdata:
